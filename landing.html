<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Platypus — Virtual Town Hall</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  :root{--cyan:#3fd0e0;--brass:#c9a24b;--violet:#7a6cf0;--pink:#e0507f;--foam:#e8f4f6;--muted:#7d97a4;}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:#000;color:var(--foam);font-family:'Space Grotesk',system-ui,sans-serif;overflow-x:hidden}
  .section{position:relative;z-index:2;min-height:100vh;width:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px}

  /* animated tech grid behind intro */
  #intro{background:#000;overflow:hidden}
  .grid{position:absolute;inset:-2px;z-index:0;opacity:.16;
    background-image:linear-gradient(rgba(63,208,224,.6) 1px,transparent 1px),
      linear-gradient(90deg,rgba(63,208,224,.6) 1px,transparent 1px);
    background-size:46px 46px;mask-image:radial-gradient(circle at 50% 50%, #000 20%, transparent 75%);
    -webkit-mask-image:radial-gradient(circle at 50% 50%, #000 20%, transparent 75%);
    animation:gridPan 24s linear infinite}
  @keyframes gridPan{to{background-position:46px 46px}}

  .globe-stage{position:relative;width:min(80vmin,700px);height:min(80vmin,700px);z-index:1}
  canvas.globe{width:100%;height:100%;display:block}

  .intro-copy{position:absolute;top:8%;left:6%;text-align:left;max-width:560px;z-index:3}
  .intro-title{font-family:'Orbitron',sans-serif;font-weight:800;
    font-size:clamp(30px,5.4vw,62px);line-height:1.05;letter-spacing:.02em;text-transform:uppercase}
  .intro-title .l{display:block;opacity:0;transform:translateY(18px);
    animation:techIn .7s cubic-bezier(.2,.9,.3,1) forwards}
  .intro-title .l1{animation-delay:1s;text-shadow:0 0 24px rgba(63,208,224,.25)}.intro-title .l2{animation-delay:1.18s}
  .intro-title .accent{color:var(--cyan);
    text-shadow:0 0 18px rgba(63,208,224,.55)}
  @keyframes techIn{to{opacity:1;transform:translateY(0)}}
  .intro-lead{font-family:'Space Grotesk',sans-serif;color:#c4d3d9;font-size:clamp(14px,1.5vw,17px);
    margin-top:18px;font-weight:400;letter-spacing:.01em;max-width:460px;min-height:3.2em;
    opacity:0;animation:techIn .6s ease forwards 1.5s}
  .intro-lead .cursor{display:inline-block;width:9px;height:1.05em;background:var(--cyan);
    margin-left:2px;vertical-align:-2px;animation:caret .8s step-end infinite}
  @keyframes caret{50%{opacity:0}}
  .team-badge{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:600;letter-spacing:.34em;
    text-transform:uppercase;color:var(--brass);margin-bottom:14px;
    display:inline-flex;align-items:center;gap:10px;
    opacity:0;animation:techIn .7s ease forwards .7s}
  .team-badge::before{content:"";width:26px;height:1px;background:var(--brass)}
  .intro-tag{font-family:'Chakra Petch',monospace;color:var(--muted);font-size:12px;letter-spacing:.36em;
    text-transform:uppercase;margin-top:14px;opacity:0;animation:techIn .8s ease forwards 1.8s}
  .intro-tag::before{content:"// "}

  .scrollcue{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:3;
    font-family:'Chakra Petch',monospace;color:var(--muted);font-size:11px;letter-spacing:.24em;
    text-transform:uppercase;opacity:0;animation:fadeIn 1s ease forwards 2.3s;display:flex;
    flex-direction:column;align-items:center;gap:10px;text-decoration:none}
  .scrollcue .chev{width:10px;height:10px;border-right:1px solid var(--cyan);
    border-bottom:1px solid var(--cyan);transform:rotate(45deg);animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:rotate(45deg) translateY(0);opacity:.3}50%{transform:rotate(45deg) translateY(5px);opacity:1}}

  /* ===== HERO ===== */
  #hero-sec{background:radial-gradient(120% 90% at 50% 0%, #0b1f2e 0%, #050a12 55%, #000 100%);
    overflow:hidden}
  /* living background carried into the hero */
  .hero-aurora{position:absolute;inset:-30%;z-index:0;filter:blur(70px);opacity:.4;pointer-events:none;
    background:
      radial-gradient(40% 50% at 30% 30%, var(--cyan), transparent 60%),
      radial-gradient(45% 55% at 70% 45%, var(--violet), transparent 60%),
      radial-gradient(40% 45% at 50% 80%, var(--brass), transparent 60%);
    background-size:200% 200%;
    animation:auroraMove 24s ease-in-out infinite, hueSpin 30s linear infinite}
  @keyframes auroraMove{0%{background-position:0% 0%,100% 0%,50% 100%}
    50%{background-position:50% 50%,50% 50%,60% 40%}100%{background-position:0% 0%,100% 0%,50% 100%}}
  @keyframes hueSpin{to{filter:blur(70px) hue-rotate(360deg)}}
  .hero-grid{position:absolute;inset:-2px;z-index:0;opacity:.10;pointer-events:none;
    background-image:linear-gradient(rgba(63,208,224,.5) 1px,transparent 1px),
      linear-gradient(90deg,rgba(63,208,224,.5) 1px,transparent 1px);
    background-size:52px 52px;
    mask-image:radial-gradient(circle at 50% 40%, #000 10%, transparent 70%);
    -webkit-mask-image:radial-gradient(circle at 50% 40%, #000 10%, transparent 70%);
    animation:gridPan 30s linear infinite}
  canvas.hero-particles{position:absolute;inset:0;z-index:0;pointer-events:none}
  #hero-sec > *{position:relative;z-index:2}

  .eyebrow{font-family:'Chakra Petch',monospace;font-size:13px;letter-spacing:.42em;
    text-transform:uppercase;color:var(--brass);font-weight:500}
  .eyebrow::before,.eyebrow::after{content:"";display:inline-block;width:34px;height:1px;
    background:var(--brass);vertical-align:middle;margin:0 14px;opacity:.6}
  h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(40px,7.8vw,92px);
    line-height:1.02;letter-spacing:-.01em;margin:18px 0 6px}
  h1 .line{display:block;overflow:hidden;padding-bottom:.14em;line-height:1.14}
  h1 .give{font-style:italic;color:var(--cyan);font-weight:300}
  h1 .seat{color:var(--brass);position:relative}
  h1 .seat::after{content:"";position:absolute;left:0;bottom:.04em;height:2px;width:100%;
    background:linear-gradient(90deg,transparent,var(--brass),transparent);
    transform:scaleX(0);transform-origin:left;transition:transform .9s ease .3s}
  .revealed h1 .seat::after{transform:scaleX(1)}
  .sub{max-width:620px;font-size:clamp(15px,1.6vw,18px);line-height:1.6;color:#a9c2cc;font-weight:300;margin-top:12px}
  .bench{display:flex;gap:18px;margin:44px 0 40px;flex-wrap:wrap;justify-content:center}
  .placard{position:relative;width:214px;padding:18px;text-align:left;border-radius:4px;
    background:linear-gradient(160deg, rgba(18,85,106,.5), rgba(8,20,32,.85));
    border:1px solid rgba(63,208,224,.22);
    box-shadow:0 18px 44px -20px rgba(0,0,0,.9), inset 0 1px 0 rgba(232,244,246,.06);

  .reveal{opacity:0;transform:translateY(24px);transition:opacity 1s ease, transform 1s cubic-bezier(.16,.84,.3,1)}

    padding:0 28px;font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:.14em;

  @media (max-width:640px){.intro-copy{position:static;text-align:center;margin-bottom:16px;max-width:100%}

    .reveal{opacity:1;transform:none}.intro-title .l,.intro-lead,.intro-tag{opacity:1;transform:none}}
